<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440">
<title>ShopReply - Small Promo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #2563eb 0%, #5b3fcc 50%, #7c3aed 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    color: #fff;
    padding: 24px 28px;
  }

  /* Subtle dot pattern overlay */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.07) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .left {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 240px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }

  .logo-icon { font-size: 28px; }

  .logo-text {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .tagline {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .benefits {
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 11.5px;
    font-weight: 600;
    opacity: 0.92;
  }

  .benefits span::before {
    content: '✓ ';
    font-weight: 700;
  }

  .right {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
  }

  .price-box {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    padding: 14px 18px;
    text-align: center;
  }

  .price-label {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .price {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .price-sub {
    font-size: 12px;
    opacity: 0.8;
    font-weight: 600;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 5px 12px;
    border-radius: 16px;
    letter-spacing: 0.3px;
  }

  /* Bottom accent line */
  .accent-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.5), rgba(255,255,255,0));
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="logo-row">
      <span class="logo-icon">🤖</span>
      <span class="logo-text">ShopReply</span>
    </div>
    <div class="tagline">Tự động trả lời<br>khách hàng 24/7</div>
    <div class="benefits">
      <span>Facebook Messenger & Zalo</span>
      <span>AI gợi ý câu trả lời thông minh</span>
      <span>100% Local — Dữ liệu riêng tư</span>
    </div>
  </div>
  <div class="right">
    <div class="price-box">
      <div class="price-label">Chỉ từ</div>
      <div class="price">299K</div>
      <div class="price-sub">/tháng</div>
    </div>
    <div class="badge">🔒 Không cloud</div>
  </div>
  <div class="accent-bar"></div>
</body>
</html>
